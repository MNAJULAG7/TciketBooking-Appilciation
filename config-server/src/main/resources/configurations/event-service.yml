server:
  port: 9001

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/event_service_db
#    username: root
##    password: manju
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

